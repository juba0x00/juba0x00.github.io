      })(() => window.markmap,null,{"t":"heading","d":1,"p":{"lines":[0,1]},"v":"Nmap → Network Mapper","c":[{"t":"heading","d":2,"p":{"lines":[4,5]},"v":"Information","c":[{"t":"list_item","d":4,"p":{"lines":[6,7]},"v":"nmap scans","c":[{"t":"ordered_list","d":5,"p":{"lines":[7,10],"start":1},"v":"","c":[{"t":"list_item","d":6,"p":{"lines":[7,8],"index":1},"v":"1. ARP scan: This scan uses ARP requests to discover live hosts ( if you and the target are in the same subnet) because arp can’t be routed","c":[{"t":"list_item","d":8,"p":{"lines":[8,9],"index":1},"v":"1. ICMP scan: This scan uses ICMP requests to identify live hosts"},{"t":"list_item","d":8,"p":{"lines":[9,10],"index":2},"v":"2. TCP/UDP ping scan: This scan sends packets to TCP ports and UDP ports to determine live hosts."}]}]},{"t":"bullet_list","d":5,"p":{"lines":[10,12]},"v":"","c":[{"t":"list_item","d":6,"p":{"lines":[10,11]},"v":"Nmap Steps"}]}]}]},{"t":"heading","d":2,"p":{"lines":[16,17]},"v":"Nmap Live Host Discovery (9)","c":[{"t":"list_item","d":4,"p":{"lines":[18,19]},"v":"<code>-sn</code> ping sweep scan   ScaN - disable port scanning <strong>(use it with the next options)</strong>","c":[{"t":"list_item","d":6,"p":{"lines":[19,20]},"v":"<code>-PE</code>  ICMP Echo request discovery probes"},{"t":"list_item","d":6,"p":{"lines":[20,21]},"v":"<code>-PR</code> ARP Scan (if you and the target are in the same subnet)"},{"t":"list_item","d":6,"p":{"lines":[21,22]},"v":"<code>-PP</code>  ICMP timetamP request discovery probes"},{"t":"list_item","d":6,"p":{"lines":[22,23]},"v":"<code>-PM</code>   ICMP netMask request discovery probes"},{"t":"list_item","d":6,"p":{"lines":[23,24]},"v":"<code>-PA [portlist]</code>   TCP Ack request discovery probes (<code>-PS21,80</code>, portnumber)"},{"t":"list_item","d":6,"p":{"lines":[24,25]},"v":"<code>-PS [portlist]</code>   SYN Ping Scan (<code>-PS21,80</code>, portnumber)"},{"t":"list_item","d":6,"p":{"lines":[25,26]},"v":"<code>-PU [portlist]</code>   UDP Ping scan  (<code>-PU21,80</code>, portnumber)"},{"t":"list_item","d":6,"p":{"lines":[26,27]},"v":"<code>-Pn</code>   Treat all hosts as online — skip host discovery"},{"t":"list_item","d":6,"p":{"lines":[27,28]},"v":"ALL→ P[ICMP echo , timestamp, netmak or SYN, ACK, UDP or don’t do host discovery]"}]},{"t":"list_item","d":4,"p":{"lines":[28,29]},"v":"<code>-sL</code>  List all the hosts will be scanned without scanning them"}]},{"t":"heading","d":2,"p":{"lines":[32,33]},"v":"Nmap Port Scan types (12)","c":[{"t":"list_item","d":4,"p":{"lines":[34,35]},"v":"Scan types : <code>-sUPPERCASE LETTER</code>","c":[{"t":"bullet_list","d":5,"p":{"lines":[35,38]},"v":"","c":[{"t":"list_item","d":6,"p":{"lines":[35,36]},"v":"Null, Fin , Xmas On scenario where these three scan types can be efficient is when scanning a target behind a stateless (non-stateful) firewall. A stateless firewall will check if the incoming packet has the SYN flag set to detect a connection attempt. Using a flag combination that does not match the SYN packet makes it possible to deceive the firewall and reach the system behind it. However, a stateful firewall will practically block all such crafted packets and render this kind of scan useless."},{"t":"list_item","d":6,"p":{"lines":[36,37]},"v":"<code>-sN</code> → Null scan"}]},{"t":"bullet_list","d":5,"p":{"lines":[40,42]},"v":"","c":[{"t":"list_item","d":6,"p":{"lines":[40,41]},"v":"<code>-sF</code> → Fin scan"}]},{"t":"bullet_list","d":5,"p":{"lines":[44,46]},"v":"","c":[{"t":"list_item","d":6,"p":{"lines":[44,45]},"v":"<code>-sX</code> → Xmas scan"}]},{"t":"bullet_list","d":5,"p":{"lines":[48,104]},"v":"","c":[{"t":"list_item","d":6,"p":{"lines":[48,49]},"v":"<code>-sT</code> → perform a TCP connection port scan   It is important to note that if you are not a privileged user (root or sudoer), a TCP connect scan is the only   possible option to discover open TCP ports."},{"t":"list_item","d":6,"p":{"lines":[52,53]},"v":"<code>-sU</code> → UDP port scan → slower than TCP"},{"t":"list_item","d":6,"p":{"lines":[53,54]},"v":"<code>-sS</code> → perform a SYN scan"},{"t":"list_item","d":6,"p":{"lines":[57,59]},"v":"<code>-sV</code> → perform a version detection scan<br>\nThis isn't stealthy but very useful","c":[{"t":"list_item","d":8,"p":{"lines":[59,60]},"v":"<code>**--version-intensity LEVEL</code>  0-9**"},{"t":"list_item","d":8,"p":{"lines":[60,62]},"v":"It is important to note that using <code>-sV</code> will force Nmap to proceed with the TCP 3-way handshake and establish the connection. The connection establishment is necessary because Nmap cannot discover the version without establishing a connection fully and communicating with the listening service. In other words, stealth SYN scan <code>-sS</code><br>\nis not possible when <code>-sV</code> option is chose"}]},{"t":"list_item","d":6,"p":{"lines":[62,63]},"v":"<code>-sA</code> → start the scan with ACK (check the firewall not check the port )","c":[{"t":"bullet_list","d":7,"p":{"lines":[63,65]},"v":"","c":[{"t":"list_item","d":8,"p":{"lines":[63,64]},"v":"without a firewall"}]},{"t":"bullet_list","d":7,"p":{"lines":[77,79]},"v":"","c":[{"t":"list_item","d":8,"p":{"lines":[77,78]},"v":"with a firewall we have three ports that aren't being blocked by the firewall. This result indicates that the firewall is blocking all other ports except for these three ports."}]}]},{"t":"list_item","d":6,"p":{"lines":[95,96]},"v":"<code>-sW</code>","c":[{"t":"list_item","d":8,"p":{"lines":[96,97]},"v":"On Windows, use an unfiltered ports with other scan types such as Window scan, SYN scan, or FIN scan, may help resolve whether the port is open."},{"t":"list_item","d":8,"p":{"lines":[97,98]},"v":"Finally, it is essential to note that the ACK scan and the window scan were very efficient at helping us map out the firewall rules. However, it is vital to remember that just because a firewall is not blocking a specific port, it does not necessarily mean that a service is listening on that port. For example, there is a possibility that the firewall rules need to be updated to reflect recent service changes. Hence, ACK and window scans are exposing the firewall rules, not the services."}]},{"t":"list_item","d":6,"p":{"lines":[98,99]},"v":"<code>--scanflag RSTFINURG</code> Custom scan"},{"t":"list_item","d":6,"p":{"lines":[99,100]},"v":"<code>-sI</code>  → Idle/Zombie scan"},{"t":"list_item","d":6,"p":{"lines":[100,101]},"v":"<code>-sC</code> → Default nmap script engine scan <code>--script=default</code>"},{"t":"list_item","d":6,"p":{"lines":[101,102]},"v":"<code>-sM</code> → Maimon Scan. This scan won’t work on most targets encountered in modern networks"}]}]}]},{"t":"heading","d":2,"p":{"lines":[108,109]},"v":"Output formats (5)","c":[{"t":"list_item","d":4,"p":{"lines":[110,111]},"v":"<code>-oN</code> file_name→ store in normal format"},{"t":"list_item","d":4,"p":{"lines":[111,112]},"v":"<code>-oG</code> file_name → store output in greppable format, one line per host"},{"t":"list_item","d":4,"p":{"lines":[112,113]},"v":"<code>-oX</code> file_name → store output in XML format → important : you can  import this file to metasploit"},{"t":"list_item","d":4,"p":{"lines":[113,114]},"v":"<code>-oS</code> file_name → store the output in script kiddie format"},{"t":"list_item","d":4,"p":{"lines":[114,115]},"v":"<code>-oA</code> file_name → store the output in many formats"}]},{"t":"heading","d":2,"p":{"lines":[118,119]},"v":"Runtime Interaction (3)","c":[{"t":"list_item","d":4,"p":{"lines":[120,121]},"v":"<code>p</code> → turn on packet tracing"},{"t":"list_item","d":4,"p":{"lines":[121,122]},"v":"<code>v</code> → inrease verbosity"},{"t":"list_item","d":4,"p":{"lines":[122,123]},"v":"<code>d</code> → increase debugging level"}]},{"t":"heading","d":2,"p":{"lines":[126,127]},"v":"Nmap speed (11)","c":[{"t":"list_item","d":4,"p":{"lines":[128,129]},"v":"To avoid IDS alerts, you might consider <code>-T0</code> or <code>-T1</code>. For instance, <code>-T0</code> scans one port at a time and waits 5 minutes between sending each probe, so you can guess how long scanning one target would take to finish."},{"t":"list_item","d":4,"p":{"lines":[129,130]},"v":"<code>-T0</code> : paranoid (very slow)"},{"t":"list_item","d":4,"p":{"lines":[130,131]},"v":"<code>-T1</code> : sneaky"},{"t":"list_item","d":4,"p":{"lines":[131,132]},"v":"<code>-T2</code> : polite"},{"t":"list_item","d":4,"p":{"lines":[132,133]},"v":"<code>-T3</code>: normal"},{"t":"list_item","d":4,"p":{"lines":[133,134]},"v":"<code>-T4</code> : aggressive"},{"t":"list_item","d":4,"p":{"lines":[134,135]},"v":"<code>-T5</code> : insane"},{"t":"list_item","d":4,"p":{"lines":[135,136]},"v":"<code>-F</code>: Fast mode - Scan fewer ports than the default scan"},{"t":"list_item","d":4,"p":{"lines":[136,137]},"v":"<code>--min-rate &lt;number&gt;</code> minimum number of packets is number per second"},{"t":"list_item","d":4,"p":{"lines":[137,138]},"v":"<code>--max-rate number</code> maximum number of packets is number per second"},{"t":"list_item","d":4,"p":{"lines":[138,139]},"v":"<code>--min-parallelism &lt;numprobes&gt;</code>"},{"t":"list_item","d":4,"p":{"lines":[139,140]},"v":"<code>--max-parallelism &lt;numprobes&gt;</code>"}]},{"t":"heading","d":2,"p":{"lines":[143,144]},"v":"OS fingerprinting (3)","c":[{"t":"list_item","d":4,"p":{"lines":[145,148]},"v":"<code>-O</code> → Enable Operating System detection<br>\n<code>--osscan-limit</code> ; limit OS  detection to promising targets<br>\n<code>--osscan-guess</code> : Guess OS more aggressively"}]},{"t":"heading","d":2,"p":{"lines":[151,152]},"v":"--script=category","c":[{"t":"bullet_list","d":3,"p":{"lines":[153,155]},"v":"","c":[{"t":"list_item","d":4,"p":{"lines":[153,154]},"v":"<code>nmap --script-help &lt;script-name&gt;</code>"}]},{"t":"bullet_list","d":3,"p":{"lines":[161,163]},"v":"","c":[{"t":"list_item","d":4,"p":{"lines":[161,162]},"v":"<code>cat /usr/share/nmap/scripts/script.db</code>"}]}]},{"t":"heading","d":2,"p":{"lines":[165,166]},"v":"Spoofing (IP, MAC and Decoys) (3)","c":[{"t":"heading","d":3,"p":{"lines":[168,169]},"v":"1- Spoofing IP","c":[{"t":"heading","d":4,"p":{"lines":[170,171]},"v":"<code>**nmap -S SpoofingIP Target**</code>","c":[{"t":"bullet_list","d":5,"p":{"lines":[171,173]},"v":"","c":[{"t":"list_item","d":6,"p":{"lines":[171,172]},"v":"If you try to scan a target from some random network using a spoofed IP address, chances are you won’t have any response routed to you, and the scan results could be unreliable."},{"t":"list_item","d":6,"p":{"lines":[172,173]},"v":"For this scan to work and give accurate results, the attacker needs to monitor the network traffic to analyze the replies."}]},{"t":"ordered_list","d":5,"p":{"lines":[173,177],"start":1},"v":"","c":[{"t":"list_item","d":6,"p":{"lines":[173,174],"index":1},"v":"1. Attacker sends a packet with a spoofed source IP address to the target machine."},{"t":"list_item","d":6,"p":{"lines":[174,175],"index":2},"v":"2. Target machine replies to the spoofed IP address as the destination."},{"t":"list_item","d":6,"p":{"lines":[175,176],"index":3},"v":"3. Attacker captures the replies to figure out open ports."}]}]}]},{"t":"heading","d":3,"p":{"lines":[182,183]},"v":"2- Spoofing MAC","c":[{"t":"heading","d":4,"p":{"lines":[184,185]},"v":"<code>--spoof-mac SPOOFED_MAC</code>"}]},{"t":"heading","d":3,"p":{"lines":[191,192]},"v":"3- Decoys","c":[{"t":"heading","d":4,"p":{"lines":[193,194]},"v":"<code>nmap -D Decoy1,Decoy2,Attacker,Decoy3,RND Target</code>","c":[{"t":"list_item","d":6,"p":{"lines":[194,195]},"v":"RND ⇒ nmap will assign this address randomly"}]}]}]},{"t":"heading","d":2,"p":{"lines":[204,205]},"v":"<strong>various options</strong>","c":[{"t":"list_item","d":4,"p":{"lines":[206,207]},"v":"<code>-f</code> , <code>--mtu &lt;val&gt;</code>: fragment packets (optionally w/given MTU) bypass some firewalls ( MTU : Maximum Transmission Unit)"},{"t":"list_item","d":4,"p":{"lines":[207,208]},"v":"<code>--exclude IP</code>"},{"t":"list_item","d":4,"p":{"lines":[208,209]},"v":"<code>--reason</code>"},{"t":"list_item","d":4,"p":{"lines":[209,210]},"v":"<code>--traceroute</code>","c":[{"t":"list_item","d":6,"p":{"lines":[210,211]},"v":"Note that Nmap’s traceroute works slightly different than the <code>traceroute</code> command found on Linux and macOS or <code>tracert</code> found on MS Windows. Standard <code>traceroute</code> starts with a packet of low TTL (Time to Live) and keeps increasing until it reaches the target. Nmap’s traceroute starts with a packet of high TTL and keeps decreasing it."},{"t":"list_item","d":6,"p":{"lines":[211,212]},"v":"It is worth mentioning that many routers are configured not to send ICMP Time-to-Live exceeded, which would prevent us from discovering their IP addresses. For more information, visit the <a href=\"https://tryhackme.com/room/activerecon\">Active Reconnaissance</a> room."}]},{"t":"list_item","d":4,"p":{"lines":[212,213]},"v":"<code>-n IP</code> : don't do address resolution (DNS)"},{"t":"list_item","d":4,"p":{"lines":[213,214]},"v":"<code>-R</code>  always do dns resolution (default sometimes)"},{"t":"list_item","d":4,"p":{"lines":[214,215]},"v":"<code>-iL</code> &lt;input file, file contains the inputs&gt;input List"},{"t":"list_item","d":4,"p":{"lines":[215,216]},"v":"<code>--top-ports &lt;number&gt;</code>"},{"t":"list_item","d":4,"p":{"lines":[216,217]},"v":"<code>--max-retries</code> &lt;1→50&gt;"},{"t":"list_item","d":4,"p":{"lines":[217,218]},"v":"<code>-p &lt;port number,..&gt;</code>"},{"t":"list_item","d":4,"p":{"lines":[218,219]},"v":"<code>-pstart number-end number</code>"},{"t":"list_item","d":4,"p":{"lines":[219,220]},"v":"<code>nmap -p-n taurget</code> means from 1 to n"},{"t":"list_item","d":4,"p":{"lines":[220,221]},"v":"<code>-p-</code>  means from 1 to 65535 (all the ports)"},{"t":"list_item","d":4,"p":{"lines":[221,222]},"v":"<code>-A</code> = (<code>-sT</code> <code>-O</code> <code>-sC</code> <code>--traceroute</code> ) aggressive scan  Enable OS detection, version detection, script scanning, and traceroute ,to find out what  is the service runs with this port  , tcprapped → cann't determine the service"},{"t":"list_item","d":4,"p":{"lines":[222,223]},"v":"<code>sudo wget -O /usr/share/nmap/scripts/&lt;script-name&gt;.nse [https://svn.nmap.org/nmap/scripts/](https://svn.nmap.org/nmap/scripts/)&lt;script-name&gt;.nse</code>"},{"t":"list_item","d":4,"p":{"lines":[223,224]},"v":"<code>-r</code>: Scan ports consecutively - don't randomize This option is useful when testing whether ports open in a consistent manner, for instance, when a target boots up."}]}]})</script>
